name: 🕯️ Shadow Ward — Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"

jobs:
  build-android:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.zip || unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Force Clean Project
        run: |
          # Удаляем папки сборки, если они попали в гит, чтобы не путать Godot
          rm -rf android/build
          rm -rf build
          mkdir -p build

      - name: Configure Godot settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export Android APK
        run: |
          # Пытаемся собрать. Если упадет — выведет ВЕСЬ лог ошибок.
          godot --headless --path . --export-debug "Android" "build/ShadowWard.apk" --verbose

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ShadowWard-Android
          path: build/ShadowWard.apk
          name: ShadowWard-Windows
          path: |
            build/ShadowWard.exe
            build/ShadowWard.pck

  release:
    name: 📦 GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "🕯️ Shadow Ward v1.0.${{ github.run_number }}"
          body: |
            ## 🕯️ Shadow Ward
            Автоматическая сборка.
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.pck
