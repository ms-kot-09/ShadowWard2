name: 🕯️ Shadow Ward — Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"

jobs:
  build-android:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Patch Export Presets (CI Optimization)
        run: |
          # Очищаем все пути, которые могут вызвать "Configuration Errors" на сервере
          # Удаляем локальные пути к ключам
          sed -i 's|keystore/debug=".*"|keystore/debug=""|g' export_presets.cfg
          sed -i 's|keystore/debug_user=".*"|keystore/debug_user=""|g' export_presets.cfg
          sed -i 's|keystore/debug_password=".*"|keystore/debug_password=""|g' export_presets.cfg
          # Удаляем пути к иконкам и заставкам (если файлов нет в репозитории, билд упадет)
          sed -i 's|launcher_icons/.*=".*"|&|g' export_presets.cfg # сохраняем структуру
          # Если Godot ругается на отсутствие иконок, мы их просто "зануляем" в конфиге для CI
          sed -i 's|^.*icon="res://.*"$||g' export_presets.cfg
          echo "✅ Конфиг export_presets.cfg подготовлен для GitHub Actions"

      - name: Configure Godot Android settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export Android APK
        run: |
          mkdir -p build
          echo "🚀 Запуск экспорта Android..."
          # Используем --verbose, чтобы в случае ошибки увидеть причину (например, какой файл иконки не найден)
          godot --headless --path . --export-debug "Android" "build/ShadowWard.apk" --verbose
          
          if [ -f "build/ShadowWard.apk" ]; then
            echo "✅ APK успешно создан!"
          else
            echo "❌ ОШИБКА: APK не создан. Проверь логи выше на наличие 'Configuration Errors'"
            exit 1
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ShadowWard-Android
          path: build/ShadowWard.apk

  build-windows:
    name: 🖥️ Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Export Windows EXE
        run: |
          mkdir -p build
          godot --headless --path . --export-release "Windows Desktop" "build/ShadowWard.exe"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: ShadowWard-Windows
          path: |
            build/ShadowWard.exe
            build/ShadowWard.pck

  release:
    name: 📦 GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "🕯️ Shadow Ward v1.0.${{ github.run_number }}"
          body: |
            ## 🕯️ Shadow Ward — Психологический хоррор
            
            Автоматическая сборка проекта:
            - **Android**: Установите APK на телефон.
            - **Windows**: Скачайте .exe и .pck (должны лежать в одной папке).
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.pck
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Export Windows EXE
        run: |
          mkdir -p build
          godot --headless --path . --export-release "Windows Desktop" "build/ShadowWard.exe"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: ShadowWard-Windows
          path: |
            build/ShadowWard.exe
            build/ShadowWard.pck

  release:
    name: 📦 GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "🕯️ Shadow Ward v1.0.${{ github.run_number }}"
          body: |
            ## 🕯️ Shadow Ward — Сборка готова!
            
            - **Android**: Установите ShadowWard.apk.
            - **Windows**: Запустите ShadowWard.exe (оба файла .exe и .pck должны быть в одной папке).
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.pck
